openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: code
    description: Code validation, fixing, and generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /code/validate:
    post:
      operationId: validateCode
      tags: [code]
      summary: Validate and auto-fix code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CodeInput"
      responses:
        "200":
          description: Validation result with fixed code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeValidationResult"
  /code/generate:
    post:
      operationId: generateCode
      tags: [code]
      summary: Generate code from a text prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CodeGenerateInput"
      responses:
        "200":
          description: Generated code snippet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeGenerateResult"
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
    CodeInput:
      type: object
      required: [code, language]
      properties:
        code:
          type: string
        language:
          type: string
          enum: [lua, python, javascript, cpp]
    CodeValidationResult:
      type: object
      required: [valid, language, originalCode, fixedCode, errors]
      properties:
        valid:
          type: boolean
        language:
          type: string
          enum: [lua, python, javascript, cpp]
        originalCode:
          type: string
        fixedCode:
          type: string
        errors:
          type: array
          items:
            type: string
    CodeGenerateInput:
      type: object
      required: [prompt, language]
      properties:
        prompt:
          type: string
          description: Natural language description of what the code should do
        language:
          type: string
          enum: [lua, python, javascript, cpp]
    CodeGenerateResult:
      type: object
      required: [language, prompt, generatedCode]
      properties:
        language:
          type: string
          enum: [lua, python, javascript, cpp]
        prompt:
          type: string
        generatedCode:
          type: string
