openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: lua
    description: Lua code validation and fixing
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /lua/validate:
    post:
      operationId: validateLua
      tags: [lua]
      summary: Validate and auto-fix Lua code
      description: Checks Lua code for structural errors and returns a fixed version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LuaInput"
      responses:
        "200":
          description: Validation result with fixed code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LuaValidationResult"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    LuaInput:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          description: The Lua code to validate and fix
    LuaValidationResult:
      type: object
      required:
        - valid
        - originalCode
        - fixedCode
        - errors
      properties:
        valid:
          type: boolean
          description: Whether the code is valid (no errors found)
        originalCode:
          type: string
          description: The original submitted code
        fixedCode:
          type: string
          description: The corrected version of the code
        errors:
          type: array
          items:
            type: string
          description: List of detected errors
