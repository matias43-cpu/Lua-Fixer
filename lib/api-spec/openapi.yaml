openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: code
    description: Code validation and fixing
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /code/validate:
    post:
      operationId: validateCode
      tags: [code]
      summary: Validate and auto-fix code
      description: Checks code for structural errors and returns a fixed version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CodeInput"
      responses:
        "200":
          description: Validation result with fixed code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeValidationResult"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CodeInput:
      type: object
      required:
        - code
        - language
      properties:
        code:
          type: string
          description: The code to validate and fix
        language:
          type: string
          enum: [lua, python, javascript, cpp]
          description: The programming language of the code
    CodeValidationResult:
      type: object
      required:
        - valid
        - language
        - originalCode
        - fixedCode
        - errors
      properties:
        valid:
          type: boolean
          description: Whether the code is valid (no errors found)
        language:
          type: string
          enum: [lua, python, javascript, cpp]
          description: The language that was validated
        originalCode:
          type: string
          description: The original submitted code
        fixedCode:
          type: string
          description: The corrected version of the code
        errors:
          type: array
          items:
            type: string
          description: List of detected errors
