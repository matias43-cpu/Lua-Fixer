kind = "web"
previewPath = "/"
title = "Lua Python Fixer"
version = "1.0.0"
id = "artifacts/lua-fixer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24791

[services.development]
run = "pnpm --filter @workspace/lua-fixer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lua-fixer", "run", "build" ]
publicDir = "artifacts/lua-fixer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24791"
BASE_PATH = "/"
